name: Build Windows EXE

on:
workflow_dispatch:

jobs:
build:
runs-on: windows-latest

steps:
  - uses: actions/checkout@v3

  - uses: actions/setup-node@v3
    with:
      node-version: 18

  - run: npm install

  - run: npx electron-builder --win portable nsis

  - uses: actions/upload-artifact@v4
    with:
      name: EXE
      path: dist/
