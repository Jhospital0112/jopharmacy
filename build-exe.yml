name: Build Windows EXE

on:
workflow_dispatch:
push:
branches: ["main"]

jobs:
build-windows:
runs-on: windows-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: 20
      cache: npm

  - name: Install dependencies
    run: npm install

  - name: Build EXE files
    run: npm run dist

  - name: Upload portable EXE
    uses: actions/upload-artifact@v4
    with:
      name: Narcotic-System-Portable
      path: release/*Portable*.exe
      if-no-files-found: error

  - name: Upload setup EXE
    uses: actions/upload-artifact@v4
    with:
      name: Narcotic-System-Setup
      path: release/*Setup*.exe
      if-no-files-found: error
```
