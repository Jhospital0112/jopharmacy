
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Controlled Drug System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <button onclick="openReceive()">Receive</button>
  <button onclick="openTransfer()">Transfer</button>

  <select id="filterType" onchange="renderTable()">
    <option value="">All Types</option>
    <option>Outpatient</option>
    <option>Inpatient</option>
    <option>Emergency</option>
    <option>Discharge</option>
  </select>
</div>

<div class="container">
  <h2>Quick Prescription Entry</h2>
  <input id="drug" placeholder="Drug">
  <input id="patient" placeholder="Patient">
  <input id="file" placeholder="File No">

  <select id="type">
    <option value="">Optional</option>
    <option>Outpatient</option>
    <option>Inpatient</option>
    <option>Emergency</option>
    <option>Discharge</option>
  </select>

  <button onclick="savePrescription()">Save</button>
</div>

<div class="table-container">
  <h2>Last Prescriptions</h2>
  <table id="table"></table>
</div>

<div id="modal" class="modal hidden">
  <div class="modal-content" id="modalContent"></div>
</div>

<script src="app.js"></script>
</body>
</html>
